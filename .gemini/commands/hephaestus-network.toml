description = "Route a request through the Hephaestus Network local-first router (cards, Hub fallback)."
prompt = """
# /hephaestus-network

Raw arguments:
{{args}}

Use the Hephaestus Network local-first router.

1. Find the Hephaestus runner (`~/.agentlas/runtime/current/bin/hephaestus`,
   `./bin/hephaestus`, or the installed plugin cache copy). First ensure the
   local Agentlas sign-in (this opens the browser only on first use):
   `hephaestus auth ensure --timeout 180`
   Then run:
   `hephaestus route "{{args}}" --runtime gemini-cli`

2. Act on the JSON decision and never bypass it:
   - action "route": report the selected card and its canonical command.
   - action "clarify": ask the `clarify_question` with the candidates.
   - action "pipeline": execute `stages` in order, saving artifacts under
     `handoff_dir`; stop and report on stage failure.
   - action "hub_fallback"/"hub_candidates": Hub lookup used redacted keywords
     only; the raw prompt and local memory were not sent.
   - action "propose_new": offer to build a new agent via /hephaestus-build.
   - action "refuse": explain the reasons (for example, loop guard).

3. Hard rules: the router only chooses an agent or fetches a BYOM Hub bundle.
   Actual tool execution follows the current host runtime's safety and
   permission model. Include the routing `receipt_id` in the final response.
"""
