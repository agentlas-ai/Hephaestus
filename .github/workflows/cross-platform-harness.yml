name: Cross-platform Goal UltraCode harness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "agentlas_cloud/**"
      - "docs/agent-workforce-ontology.md"
      - "schemas/workforce-*.schema.json"
      - "benchmarks/workforce-ontology/**"
      - "manifest.json"
      - "scripts/verify-package.sh"
      - ".gitattributes"
      - "assets/model2vec/**"
      - "ontology/model_assets.py"
      - "bin/hephaestus"
      - "bin/hephaestus.cmd"
      - "skills/hephaestus-storm/**"
      - "skills/hephaestus-network/**"
      - ".agents/skills/hephaestus-storm/**"
      - ".agents/skills/hephaestus-network/**"
      - ".agents/workflows/hep-network.md"
      - "codex/**"
      - "claude/**"
      - "gemini/**"
      - "antigravity/**"
      - "cursor/**"
      - "opencode/**"
      - "openclaw/**"
      - "hermes/**"
      - "scripts/verify-cross-platform-harness.py"
      - "tests/test_stormbreaker_goal_ultracode_harness.py"
      - "tests/test_stormbreaker_runner.py"
      - "tests/test_model2vec_asset.py"
      - "tests/test_workforce_ontology.py"
      - "tests/test_workforce_benchmark.py"
      - "tests/test_workforce_workflow_gates.py"
      - ".github/workflows/cross-platform-harness.yml"
      - ".github/workflows/release-runtime.yml"
  push:
    branches: [main]
    paths:
      - "agentlas_cloud/**"
      - "docs/agent-workforce-ontology.md"
      - "schemas/workforce-*.schema.json"
      - "benchmarks/workforce-ontology/**"
      - "manifest.json"
      - "scripts/verify-package.sh"
      - ".gitattributes"
      - "assets/model2vec/**"
      - "ontology/model_assets.py"
      - "bin/hephaestus"
      - "bin/hephaestus.cmd"
      - "skills/hephaestus-storm/**"
      - "skills/hephaestus-network/**"
      - ".agents/skills/hephaestus-storm/**"
      - ".agents/skills/hephaestus-network/**"
      - ".agents/workflows/hep-network.md"
      - "codex/**"
      - "claude/**"
      - "gemini/**"
      - "antigravity/**"
      - "cursor/**"
      - "opencode/**"
      - "openclaw/**"
      - "hermes/**"
      - "scripts/verify-cross-platform-harness.py"
      - "tests/test_stormbreaker_goal_ultracode_harness.py"
      - "tests/test_stormbreaker_runner.py"
      - "tests/test_model2vec_asset.py"
      - "tests/test_workforce_ontology.py"
      - "tests/test_workforce_benchmark.py"
      - "tests/test_workforce_workflow_gates.py"
      - ".github/workflows/cross-platform-harness.yml"
      - ".github/workflows/release-runtime.yml"

permissions:
  contents: read

concurrency:
  group: cross-platform-harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness-contract:
    name: ${{ matrix.os }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install contract test dependencies
        run: python -m pip install pytest==8.4.1 jsonschema

      - name: Verify Agent Workforce Ontology contracts
        run: >-
          python -m pytest -q
          tests/test_workforce_ontology.py
          tests/test_workforce_benchmark.py

      - name: Run Stormbreaker contract suite
        # Stormbreaker intentionally launches and reaps a real background child.
        # Disable Actions' descendant cleanup marker for this step so its Windows
        # cleanup signal cannot interrupt the parent pytest process mid-contract.
        env:
          RUNNER_TRACKING_ID: ""
        run: >-
          python -m pytest -q --full-trace
          tests/test_stormbreaker_goal_ultracode_harness.py
          tests/test_stormbreaker_runner.py
          tests/test_network_pipeline.py
          tests/test_model_allocation.py
          tests/test_run_journal.py
          tests/test_model2vec_asset.py
          tests/test_workforce_workflow_gates.py

      - name: Prove native wrapper and adapter byte identity
        run: >-
          python scripts/verify-cross-platform-harness.py
          --proof "${{ runner.temp }}/harness-proof.json"

      - uses: actions/upload-artifact@v4
        with:
          name: harness-proof-${{ runner.os }}-py${{ matrix.python }}
          path: ${{ runner.temp }}/harness-proof.json
          if-no-files-found: error

  compare-platform-proofs:
    name: Compare all platform prompt bytes
    needs: harness-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: harness-proof-*
          path: proofs
      - name: Require one exact prompt across macOS, Linux, and Windows
        run: python scripts/verify-cross-platform-harness.py --compare-dir proofs
