description = "Prepare explicitly named Agentlas Hub or Cloud agents."
prompt = """
# /hep-call

Raw arguments:
{{args}}

Syntax: `/hep-call agent-a, agent-b {context}`. Prefix owner packages
with `cloud:` and public Hub agents with `hub:` when you want to be explicit.

Find the Hephaestus runner at `~/.agentlas/runtime/current/bin/hephaestus` or
`./bin/hephaestus`, ensure Agentlas sign-in with `hephaestus auth ensure
--timeout 180`, split the arguments into an agent list and context, then run:

`hephaestus call "<agents>" "<context>" --runtime gemini-cli`

For each prepared agent, follow `output.entry_excerpt` and
`output.grounding.directive`. The Hub returns BYOM runtime instructions;
Gemini executes them with the current model and permission model. Include the
top-level `receipt_id` and each prepared `execution_id`.
"""
